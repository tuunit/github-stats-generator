name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: src/go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Verify committed action build
        run: |
          npm run build:action
          git diff --exit-code dist/action.js

      - name: Run Go tests
        run: |
          cd src
          go test ./...
          go build ./...

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          workdir: src
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
